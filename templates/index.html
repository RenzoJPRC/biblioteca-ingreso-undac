<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - Biblioteca UNDAC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="shortcut icon" href="{{ url_for('static', filename='logo.png') }}" type="image/png">
</head>

<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">

    <!-- Background Decoration -->
    <div class="absolute inset-0 z-0 opacity-5">
        <div class="absolute top-0 left-0 w-96 h-96 bg-sky-500 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2">
        </div>
        <div
            class="absolute bottom-0 right-0 w-96 h-96 bg-blue-500 rounded-full blur-3xl translate-x-1/2 translate-y-1/2">
        </div>
    </div>

    <!-- Main Container Card -->
    <div
        class="relative z-10 w-full max-w-4xl bg-white/80 backdrop-blur-xl p-8 rounded-3xl shadow-2xl border border-white/50 animate-fade-in-up">

        <!-- HEADER / LOGO -->
        <div class="mb-10 text-center flex flex-col items-center">
            <div class="p-3 bg-white rounded-full shadow-md mb-3 ring-2 ring-sky-50 inline-block">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo UNDAC"
                    class="w-16 h-16 object-contain">
            </div>
            <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Biblioteca Central</h1>
            <p class="text-slate-500 text-sm font-medium">Universidad Nacional Daniel Alcides Carrión</p>
        </div>

        <!-- TWO COLUMNS GRID -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">

            <!-- COLUMN 1: CENTRAL / PISOS -->
            <div
                class="bg-sky-50/50 p-6 rounded-2xl border border-sky-100 flex flex-col justify-center h-full shadow-sm hover:shadow-md transition-shadow">
                <h2 class="text-sky-800 font-bold uppercase tracking-wider text-sm mb-4 flex items-center gap-2">
                    <i class="ph-fill ph-buildings text-lg"></i>
                    Accesos Central
                </h2>

                <div class="space-y-3">
                    <!-- Piso 1 -->
                    <a href="/piso1"
                        class="group flex items-center justify-between p-4 bg-white border border-sky-200 rounded-xl hover:bg-sky-600 hover:text-white hover:border-sky-600 transition-all duration-300 shadow-sm">
                        <div class="flex items-center gap-3">
                            <span
                                class="w-8 h-8 rounded-full bg-sky-100 text-sky-600 flex items-center justify-center font-bold text-sm group-hover:bg-white/20 group-hover:text-white transition-colors">1</span>
                            <span class="font-bold text-lg text-slate-700 group-hover:text-white">Piso 1</span>
                        </div>
                        <i class="ph-bold ph-caret-right text-slate-300 group-hover:text-white transition-colors"></i>
                    </a>

                    <!-- Piso 2 -->
                    <a href="/piso2"
                        class="group flex items-center justify-between p-4 bg-white border border-emerald-200 rounded-xl hover:bg-emerald-600 hover:text-white hover:border-emerald-600 transition-all duration-300 shadow-sm">
                        <div class="flex items-center gap-3">
                            <span
                                class="w-8 h-8 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center font-bold text-sm group-hover:bg-white/20 group-hover:text-white transition-colors">2</span>
                            <span class="font-bold text-lg text-slate-700 group-hover:text-white">Piso 2</span>
                        </div>
                        <i class="ph-bold ph-caret-right text-slate-300 group-hover:text-white transition-colors"></i>
                    </a>

                    <!-- Piso 3 -->
                    <a href="/piso3"
                        class="group flex items-center justify-between p-4 bg-white border border-violet-200 rounded-xl hover:bg-violet-600 hover:text-white hover:border-violet-600 transition-all duration-300 shadow-sm">
                        <div class="flex items-center gap-3">
                            <span
                                class="w-8 h-8 rounded-full bg-violet-100 text-violet-600 flex items-center justify-center font-bold text-sm group-hover:bg-white/20 group-hover:text-white transition-colors">3</span>
                            <span class="font-bold text-lg text-slate-700 group-hover:text-white">Piso 3</span>
                        </div>
                        <i class="ph-bold ph-caret-right text-slate-300 group-hover:text-white transition-colors"></i>
                    </a>
                </div>
            </div>

            <!-- COLUMN 2: ADMIN PANEL -->
            <a href="/admin"
                class="group relative overflow-hidden bg-slate-800 rounded-2xl p-6 flex flex-col items-center justify-center gap-4 text-center hover:bg-slate-900 transition-all shadow-lg hover:shadow-xl hover:scale-[1.02] border border-slate-700">
                <!-- Decorative Icon Background -->
                <i
                    class="ph-fill ph-shield-check text-9xl absolute text-slate-700/20 -bottom-8 -right-8 group-hover:text-slate-600/30 transition-all duration-500"></i>

                <div
                    class="p-6 bg-slate-700/50 rounded-full group-hover:bg-slate-600/50 transition-colors backdrop-blur-sm z-10">
                    <i
                        class="ph-fill ph-user-gear text-5xl text-sky-400 group-hover:text-sky-300 transition-colors"></i>
                </div>

                <div class="z-10">
                    <h2 class="text-2xl font-bold text-white mb-1">Panel Administrador</h2>
                    <p class="text-slate-400 text-sm group-hover:text-slate-300 transition-colors">Gestión y Reportes
                    </p>
                </div>

                <div
                    class="mt-4 px-6 py-2 rounded-full border border-slate-600 text-slate-300 text-xs font-bold uppercase tracking-widest group-hover:bg-sky-600 group-hover:border-sky-600 group-hover:text-white transition-all z-10">
                    Acceder <i class="ph-bold ph-arrow-right inline-block ml-1"></i>
                </div>
            </a>

        </div>

        <!-- FOOTER -->
        <div class="mt-8 text-center text-[10px] text-slate-400 font-medium">
            &copy; 2026 Biblioteca Central UNDAC - Todos los derechos reservados.
        </div>
    </div>

    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
    </style>
</body>

</html>
