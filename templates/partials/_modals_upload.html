<!-- MODAL ALUMNOS -->
<div id="modal-upload-alumnos"
    class="fixed inset-0 bg-black/60 hidden backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-6 transform transition-all scale-100">

        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <i class="ph ph-microsoft-excel-logo text-green-600 text-2xl"></i>
                Importar Alumnos
            </h3>
            <button onclick="document.getElementById('modal-upload-alumnos').classList.add('hidden')"
                class="text-slate-400 hover:text-red-500">
                <i class="ph ph-x text-2xl"></i>
            </button>
        </div>

        <p class="text-sm text-slate-500 mb-4 leading-relaxed">
            Sube el archivo Excel oficial de la universidad para actualizar la base de datos de ALUMNOS.
        </p>

        <form id="form-excel-alumnos" class="space-y-4">
            <div class="relative group">
                <input type="file" name="archivo_excel" accept=".xlsx" required
                    class="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-sky-50 file:text-sky-700 hover:file:bg-sky-100 cursor-pointer border border-dashed border-slate-300 rounded-lg p-2 group-hover:border-sky-400 transition-colors" />
            </div>

            <div id="upload-status-alumnos" class="hidden p-3 rounded-lg text-sm font-medium flex items-center gap-2">
            </div>

            <div class="pt-2 flex justify-end gap-3">
                <button type="button" onclick="document.getElementById('modal-upload-alumnos').classList.add('hidden')"
                    class="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg font-medium transition-colors">Cancelar</button>
                <button type="submit"
                    class="px-6 py-2 bg-sky-600 hover:bg-sky-500 text-white rounded-lg font-bold shadow-lg shadow-sky-600/20 transition-all flex items-center gap-2">
                    <i class="ph ph-upload-simple text-lg"></i>
                    Procesar Archivo
                </button>
            </div>
        </form>
    </div>
</div>

<!-- MODAL EGRESADOS -->
<div id="modal-upload-egresados"
    class="fixed inset-0 bg-black/60 hidden backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-6 transform transition-all scale-100">

        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <i class="ph ph-microsoft-excel-logo text-green-600 text-2xl"></i>
                Importar Egresados
            </h3>
            <button onclick="document.getElementById('modal-upload-egresados').classList.add('hidden')"
                class="text-slate-400 hover:text-red-500">
                <i class="ph ph-x text-2xl"></i>
            </button>
        </div>

        <p class="text-sm text-slate-500 mb-4 leading-relaxed">
            Sube el archivo Excel con los datos de los EGRESADOS.
        </p>

        <form id="form-excel-egresados" class="space-y-4">
            <div class="relative group">
                <input type="file" name="archivo_excel" accept=".xlsx" required
                    class="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 cursor-pointer border border-dashed border-slate-300 rounded-lg p-2 group-hover:border-emerald-400 transition-colors" />
            </div>

            <div id="upload-status-egresados" class="hidden p-3 rounded-lg text-sm font-medium flex items-center gap-2">
            </div>

            <div class="pt-2 flex justify-end gap-3">
                <button type="button"
                    onclick="document.getElementById('modal-upload-egresados').classList.add('hidden')"
                    class="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg font-medium transition-colors">Cancelar</button>
                <button type="submit"
                    class="px-6 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg font-bold shadow-lg shadow-emerald-600/20 transition-all flex items-center gap-2">
                    <i class="ph ph-upload-simple text-lg"></i>
                    Procesar Egresados
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // Formulario Alumnos
    document.getElementById('form-excel-alumnos').addEventListener('submit', function (e) {
        e.preventDefault();
        manejarEnvioExcel(this, '/admin/subir_excel', 'upload-status-alumnos');
    });

    // Formulario Egresados
    document.getElementById('form-excel-egresados').addEventListener('submit', function (e) {
        e.preventDefault();
        manejarEnvioExcel(this, '/admin/subir_excel_egresados', 'upload-status-egresados');
    });

    function manejarEnvioExcel(formElement, url, statusDivId) {
        const formData = new FormData(formElement);
        const statusDiv = document.getElementById(statusDivId);
        const btn = formElement.querySelector('button[type="submit"]');

        // UI de carga
        statusDiv.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');
        statusDiv.classList.add('bg-blue-100', 'text-blue-700');
        statusDiv.innerHTML = '<i class="ph ph-spinner animate-spin text-lg"></i> Procesando archivo...';
        btn.disabled = true;
        btn.classList.add('opacity-50');

        fetch(url, { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                if (data.status === 'success') {
                    statusDiv.className = 'p-3 rounded-lg text-sm bg-green-100 text-green-700 font-medium flex items-center gap-2';
                    statusDiv.innerHTML = `<i class="ph ph-check-circle text-lg"></i> ${data.msg}`;
                    setTimeout(() => location.reload(), 2000);
                } else {
                    statusDiv.className = 'p-3 rounded-lg text-sm bg-red-100 text-red-700 font-medium flex items-center gap-2';
                    statusDiv.innerHTML = `<i class="ph ph-warning-circle text-lg"></i> ${data.msg}`;
                }
            })
            .catch(error => {
                console.error(error);
                btn.disabled = false;
                statusDiv.innerText = "Error de conexión";
            });
    }
</script>
