<!-- templates/partials/_search_bar.html -->
<div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 shrink-0">
    <h3 class="text-sm font-bold text-slate-500 uppercase mb-4">{{ search_title }}</h3>
    <div class="flex gap-4">
        <input type="text" id="input-busqueda" placeholder="{{ search_placeholder }}"
            class="flex-1 border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-{{ base_color }}-500 outline-none">
        <button onclick="nuevaBusqueda()"
            class="bg-{{ base_color }}-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-{{ base_color }}-500 transition-colors shadow-sm">
            <i class="ph ph-magnifying-glass text-lg align-middle"></i> Buscar
        </button>
    </div>
</div>
