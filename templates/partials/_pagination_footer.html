<!-- templates/partials/_pagination_footer.html -->
<div class="px-6 py-3 border-t border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
    <button onclick="cambiarPagina(-1)" id="btn-prev"
        class="flex items-center gap-1 text-slate-500 hover:text-{{ base_color }}-600 disabled:opacity-50 disabled:cursor-not-allowed font-medium text-sm transition-colors">
        <i class="ph ph-caret-left text-lg"></i> Anterior
    </button>

    <div class="flex items-center gap-2">
        <span class="text-xs font-bold text-slate-400 uppercase">Página</span>
        <select id="select-pagina" onchange="irAPagina(this.value)"
            class="bg-white border border-slate-300 text-slate-700 text-xs rounded px-2 py-1 outline-none focus:border-{{ base_color }}-500 font-bold">
        </select>
    </div>

    <button onclick="cambiarPagina(1)" id="btn-next"
        class="flex items-center gap-1 text-slate-500 hover:text-{{ base_color }}-600 disabled:opacity-50 disabled:cursor-not-allowed font-medium text-sm transition-colors">
        Siguiente <i class="ph ph-caret-right text-lg"></i>
    </button>
</div>
