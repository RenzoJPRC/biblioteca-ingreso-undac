<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administración - Biblioteca UNDAC</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='logo.png') }}" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white h-screen flex items-center justify-center font-sans overflow-hidden relative">

    <!-- Background Elements -->
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-emerald-600/20 blur-[120px] rounded-full">
        </div>
    </div>

    <!-- Login Container -->
    <div
        class="z-10 bg-slate-800/80 backdrop-blur-xl border border-slate-700/50 p-10 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-widest text-sky-400">UNDAC</h1>
            <p class="text-xs text-slate-400 uppercase tracking-widest mt-1">Panel de Administración</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div
            class="mb-4 bg-rose-500/10 border border-rose-500/50 text-rose-400 px-4 py-3 rounded-lg text-sm text-center">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="/admin/login" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="space-y-1">
                <label for="usuario" class="block text-xs font-medium text-slate-400 uppercase mb-2">Usuario</label>
                <input type="text" id="usuario" name="usuario" required
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-colors"
                    placeholder="Escriba su usuario">
            </div>

            <div>
                <label for="password" class="block text-xs font-medium text-slate-400 uppercase mb-2">Contraseña</label>
                <input type="password" id="password" name="password" required
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-colors"
                    placeholder="••••••••">
            </div>

            <button type="submit"
                class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded-lg uppercase tracking-wide text-sm transition-colors shadow-lg shadow-sky-600/20">
                Iniciar Sesión
            </button>
        </form>

        <div class="mt-8 text-center border-t border-slate-700 pt-6">
            <a href="/" class="text-slate-500 hover:text-slate-300 text-sm transition-colors">← Volver al Punto de
                Acceso</a>
        </div>
    </div>

</body>

</html>
